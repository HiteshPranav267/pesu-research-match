        fetch(`${API}/departments?campus=${campus}`)
          .then((r) => r.json())
          .then((data) => setDepartments(data[campus] || []))
          .catch(() => setDepartments([]));
      }, [campus]);

      // PDF extraction
      const extractPdf = useCallback(async (file) => {
        setPdfName(file.name);
        const buf = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map((t) => t.str).join(" ") + " ";
        }
        setPdfText(text.trim());
      }, []);

      const handleFile = useCallback(
        (file) => { if (file && file.type === "application/pdf") extractPdf(file); },
        [extractPdf]
      );

      const effectiveQuery = tab === "text" ? query : pdfText;

      const handleMatch = async () => {
        if (!effectiveQuery.trim()) return;
        setLoading(true);
        setResults(null);
        setAiSummary("");
        try {
          const body = { query: effectiveQuery, campus };
          if (activeDept) body.department = activeDept;
          const resp = await fetch(`${API}/match`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const data = await resp.json();
          setAiSummary(data.ai_summary || "");
          const filtered = (data.results || []).filter((p) => p.score >= MIN_SCORE);
          setResults(filtered);
          // Scroll to results
          setTimeout(() => resultsRef.current?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
        } catch {
          alert("Could not reach the API. Make sure the server is running on port 8000.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex flex-col">
          {/* ── Navigation (Moved inside React) ── */}
          <nav className="bg-[#0e0e11]/60 backdrop-blur-xl shadow-[0_0_48px_0_rgba(61,53,166,0.06)] sticky top-0 z-50">
            <div className="flex justify-between items-center w-full px-8 py-4 max-w-screen-2xl mx-auto">
              <div className="flex items-center gap-8">
                <button onClick={() => setView("explore")} className="text-2xl font-bold tracking-tighter text-primary font-headline hover:opacity-80 transition-opacity">ResearchMatch PES</button>
                <div className="hidden md:flex items-center gap-6">
                  <button
                    onClick={() => setView("explore")}
                    className={`${view === 'explore' ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant font-medium hover:text-primary'} font-label transition-colors duration-300 pb-1`}
                  >
                    Explore
                  </button>
                  <button
                    onClick={() => setView("about")}
                    className={`${view === 'about' ? 'text-primary font-bold border-b-2 border-primary' : 'text-on-surface-variant font-medium hover:text-primary'} font-label transition-colors duration-300 pb-1`}
                  >
                    About
                  </button>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <a href="https://staff.pes.edu" target="_blank"
                  className="bg-surface-container-high px-6 py-2 rounded-full font-label text-sm font-bold border border-outline-variant/20 hover:text-primary transition-colors">Staff
                  Portal ↗</a>
              </div>
            </div>
          </nav>

          <main className="relative isolate flex-1">
            {view === "explore" ? (
              <>
                {/* Organic Blobs */}
                <div className="absolute top-[-10%] right-[-10%] w-[600px] h-[600px] bg-primary-container/20 rounded-full organic-blob" />
                <div className="absolute top-[20%] left-[-15%] w-[800px] h-[800px] bg-secondary-container/30 rounded-full organic-blob" />
                <div className="absolute bottom-[0%] right-[10%] w-[500px] h-[500px] bg-primary-container/10 rounded-full organic-blob" />

                <section className="max-w-screen-2xl mx-auto px-6 md:px-8 pt-16 md:pt-20 pb-20 md:pb-40">
                  {/* ── Hero ── */}
                  <div className="relative z-10 mb-12 md:mb-16">
                    <h1 className="font-headline font-bold text-5xl md:text-[7rem] kinetic-text tracking-tighter max-w-4xl mb-6">
                      <span className="text-primary">Find your</span><br />
                      <span className="text-secondary leading-none">scholarly synergy</span>
                    </h1>
                    <p className="text-on-surface-variant text-lg md:text-2xl max-w-2xl font-medium tracking-tight">
                      Break the traditional silos. AI-powered two-stage matching connects you with the right PES faculty for your research.
                    </p>
                  </div>

                  {/* ── Main Grid ── */}
                  <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 md:gap-12 items-start">

                    {/* ── Left: Filters ── */}
                    <div className="lg:col-span-4 space-y-10">

                      {/* Campus Toggle */}
                      <div className="space-y-4">
                        <label className="font-label text-xs uppercase tracking-widest text-on-surface-variant font-bold">Select Campus</label>
                        <div className="bg-surface-container-low p-2 rounded-full inline-flex gap-2">
                          {["RR", "EC"].map((c) => (
                            <button
                              key={c}
                              onClick={() => setCampus(c)}
                              className={`px-8 py-3 rounded-full font-bold font-label transition-all ${campus === c
                                ? "bg-primary text-on-primary shadow-lg shadow-primary/20"
                                : "text-on-surface-variant hover:text-on-surface"
                                }`}
                            >
                              {c} Campus
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Department Chips */}
                      {departments.length > 0 && (
                        <div className="space-y-4">
                          <label className="font-label text-xs uppercase tracking-widest text-on-surface-variant font-bold">Department Filter</label>
                          <div className="flex flex-wrap gap-2">
                            <button
                              onClick={() => setActiveDept(null)}
                              className={`px-5 py-2 rounded-full border-2 font-bold font-label text-sm transition-colors ${activeDept === null
                                ? "border-primary text-primary bg-primary/10"
                                : "border-outline-variant/40 text-on-surface-variant hover:border-primary hover:text-primary"
                                }`}
                            >
                              All
                            </button>
                            {departments.map((d) => (
                              <button
                                key={d}
                                onClick={() => setActiveDept(d === activeDept ? null : d)}
                                className={`px-5 py-2 rounded-full border-2 font-bold font-label text-sm transition-colors ${activeDept === d
                                  ? "border-secondary text-secondary bg-secondary/10"
                                  : "border-outline-variant/40 text-on-surface-variant hover:border-secondary hover:text-secondary"
                                  }`}
                              >
                                {d}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Stats Card */}
                      <div className="p-6 rounded-xl bg-surface-container-high border border-outline-variant/10">
                        <div className="flex items-center gap-3 mb-4">
                          <span className="material-symbols-outlined filled text-primary text-2xl">analytics</span>
                          <span className="font-headline font-bold text-lg">Engine Stats</span>
                        </div>
                        <div className="space-y-3 text-sm">
                          <div className="flex justify-between">
                            <span className="text-on-surface-variant">Faculty Profiles</span>
                            <span className="font-bold text-primary">{profCount}+ Enriched</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-on-surface-variant">Dense Model</span>
                            <span className="font-bold text-on-surface">BGE-Large-v1.5</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-on-surface-variant">Sparse Engine</span>
                            <span className="font-bold text-secondary">BM25 Algorithm</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-on-surface-variant">Decision Logic</span>
                            <span className="font-bold text-primary">Weighted Fusion</span>
                          </div>
                          <div className="flex justify-between">
                            <span className="text-on-surface-variant">Matching Logic</span>
                            <span className="font-bold text-secondary">Two-Stage Hybrid</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* ── Right: Input & Results ── */}
                    <div className="lg:col-span-8">
                      <div className="bg-surface-container-low rounded-xl p-6 md:p-12 border border-outline-variant/10 shadow-2xl">

                        {/* Tab Selector */}
                        <div className="flex gap-8 mb-8 border-b border-outline-variant/20">
                          <button
                            onClick={() => setTab("text")}
                            className={`pb-4 text-xl md:text-2xl font-headline font-bold transition-all ${tab === "text"
                              ? "text-on-surface border-b-4 border-primary"
                              : "text-on-surface-variant hover:text-on-surface"
                              }`}
                          >
                            Describe Interests
                          </button>
                          <button
                            onClick={() => setTab("pdf")}
                            className={`pb-4 text-xl md:text-2xl font-headline font-bold transition-all flex items-center gap-3 ${tab === "pdf"
                              ? "text-on-surface border-b-4 border-secondary"
                              : "text-on-surface-variant hover:text-on-surface"
                              }`}
                          >
                            Resume Upload
                            <span className="text-xs bg-secondary-container text-on-secondary-container px-2 py-0.5 rounded-full font-label uppercase">PDF</span>
                          </button>
                        </div>

                        {/* Input Area */}
                        <div className="space-y-6">
                          {tab === "text" ? (
                            <div className="neon-border">
                              <textarea
                                className="w-full h-64 md:h-80 bg-surface-container-lowest border-none rounded-lg p-6 md:p-8 text-lg font-body text-on-surface placeholder:text-outline/40 focus:ring-0 resize-none"
                                placeholder="Describe your research interests, current projects, or a specific problem you're looking to solve...&#10;&#10;Example: I'm interested in applying deep learning to medical image analysis, specifically for early cancer detection using CNNs and transformer architectures."
                                value={query}
                                onChange={(e) => setQuery(e.target.value)}
                              />
                            </div>
                          ) : (
                            <div
                              className={`relative border-2 border-dashed rounded-xl p-12 text-center transition-all cursor-pointer ${dragOver
                                ? "drop-active"
                                : "border-outline-variant/30 hover:border-primary/50"
                                }`}
                              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                              onDragLeave={() => setDragOver(false)}
                              onDrop={(e) => {
                                e.preventDefault();
                                setDragOver(false);
                                handleFile(e.dataTransfer.files[0]);
                              }}
                            >
                              <input
                                type="file"
                                accept="application/pdf"
                                className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                                onChange={(e) => handleFile(e.target.files[0])}
                              />
                              <span className="material-symbols-outlined text-5xl text-on-surface-variant/30 mb-4 block">upload_file</span>
                              <p className="text-on-surface-variant font-medium text-lg">Drag & drop your resume PDF</p>
                              <p className="text-outline text-sm mt-2">or click to browse</p>
                              {pdfName && (
                                <div className="mt-6 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-primary/10 text-primary font-label font-bold text-sm">
                                  <span className="material-symbols-outlined text-base">check_circle</span>
                                  {pdfName}
                                </div>
                              )}
                            </div>
                          )}

                          {/* Bottom Actions */}
                          <div className="flex flex-col md:flex-row gap-4 items-center justify-between">
                            <div className="flex items-center gap-3 text-on-surface-variant">
                              <span className="material-symbols-outlined filled text-primary text-xl">verified</span>
                              <span className="text-sm font-medium">Matching against {profCount}+ enriched faculty profiles</span>
                            </div>
                            <button
                              disabled={!effectiveQuery.trim() || loading}
                              onClick={handleMatch}
                              className="w-full md:w-auto bg-secondary text-on-surface px-10 py-5 rounded-full font-headline font-black text-lg flex items-center justify-center gap-3 shadow-[0_0_40px_rgba(150,145,255,0.3)] hover:scale-105 active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:shadow-none"
                            >
                              {loading ? (
                                <>
                                  <span className="material-symbols-outlined animate-spin">progress_activity</span>
                                  Analyzing...
                                </>
                              ) : (
                                <>
                                  Find Matching Professors
                                  <span className="material-symbols-outlined text-2xl">bolt</span>
                                </>
                              )}
                            </button>
                          </div>
                        </div>
                      </div>

                      {/* ── Results Section ── */}
                      <div ref={resultsRef}>
                        {loading && (
                          <div className="mt-10">
                            <h2 className="font-headline font-bold text-2xl mb-6 flex items-center gap-3">
                              <span className="material-symbols-outlined text-secondary animate-pulse">neurology</span>
                              Two-stage analysis in progress...
                            </h2>
                            <SkeletonCards />
                          </div>
                        )}

                        {!loading && results !== null && (
                          <div className="mt-10">
                            <h2 className="font-headline font-bold text-2xl mb-6">
                              {results.length > 0 ? (
                                <span className="flex items-center gap-3">
                                  <span className="material-symbols-outlined filled text-primary text-3xl">school</span>
                                  {results.length} Match{results.length !== 1 ? "es" : ""} Found
                                </span>
                              ) : (
                                <span className="flex items-center gap-3 text-on-surface-variant">
                                  <span className="material-symbols-outlined text-3xl">search_off</span>
                                  No Strong Matches
                                </span>
                              )}
                            </h2>

                            {results.length === 0 ? (
                              <div className="text-center py-16 px-8 rounded-xl bg-surface-container-high border border-outline-variant/10">
                                <span className="text-5xl block mb-4">🔍</span>
                                <p className="text-on-surface-variant text-lg max-w-md mx-auto">
                                  No professors scored above {Math.round(MIN_SCORE * 100)}% relevance. Try broadening your description or removing department filters.
                                </p>
                              </div>
                            ) : (
                              <div className="space-y-4">
                                {aiSummary && (
                                  <div className="mb-8 p-6 rounded-xl bg-gradient-to-br from-primary-container/20 to-secondary-container/20 border border-primary/30">
                                    <h3 className="font-headline font-bold text-lg flex items-center gap-2 mb-2 text-primary">
                                      <span className="material-symbols-outlined">auto_awesome</span>
                                      AI Matchmaker Insight
                                    </h3>
                                    <p className="text-on-surface-variant leading-relaxed">
                                      {aiSummary}
                                    </p>
                                  </div>
                                )}
                                {results.map((prof, i) => (
                                  <ProfCard key={i} prof={prof} rank={i + 1} />
                                ))}
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </section>
              </>
            ) : (
              <AboutPage />
            )}
          </main>

          {/* ── Footer ── */}
          <footer className="bg-[#000000] rounded-t-[3rem] mt-20">
            <div
              class="grid grid-cols-1 md:grid-cols-4 gap-12 px-12 py-20 w-full max-w-screen-2xl mx-auto font-body text-sm tracking-wide">
              <div class="space-y-6">
                <span class="text-xl font-black text-primary font-headline">ResearchMatch PES</span>
                <p class="text-on-surface-variant leading-relaxed">AI-powered faculty discovery. Connect with cross-departmental
                  pioneers and accelerate your academic trajectory.</p>
              </div>
              <div class="space-y-6">
                <h4 class="text-primary font-bold uppercase tracking-widest text-xs">University Links</h4>
                <ul class="space-y-3">
                  <li><a class="text-on-surface-variant hover:text-primary transition-all" href="https://pes.edu"
                    target="_blank">PES University</a></li>
                  <li><a class="text-on-surface-variant hover:text-primary transition-all" href="https://staff.pes.edu"
                    target="_blank">Staff Directory</a></li>
                </ul>
              </div>
              <div class="space-y-6">
                <h4 class="text-primary font-bold uppercase tracking-widest text-xs">Team Students</h4>
                <ul class="space-y-3">
                  <li class="text-on-surface-variant">
                    <a href="https://hiteshpranav267.github.io/hitesh-engineering/" target="_blank" class="hover:text-primary transition-colors">Hitesh Pranav Reddy</a>
                  </li>
                  <li class="text-on-surface-variant">Dakshin S</li>
                  <li class="text-on-surface-variant">Pragna Prasad</li>
                </ul>
              </div>
              <div class="space-y-6">
                <h4 class="text-primary font-bold uppercase tracking-widest text-xs">System Status</h4>
                <div class="flex items-center gap-3">
                  <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                  <span class="text-on-surface-variant">Two-Stage Engine Active</span>
                </div>
                <p class="text-on-surface-variant text-xs mt-8">© MLA Project · ResearchMatch</p>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
